<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@600&amp;display=swap');
      .wordmark {
        font-family: 'Sora', 'Helvetica Neue', Arial, sans-serif;
        font-weight: 600;
        font-size: 52px;
        letter-spacing: -2px;
        fill: #1A1917;
      }
      .tagline {
        font-family: 'Sora', 'Helvetica Neue', Arial, sans-serif;
        font-weight: 400;
        font-size: 11px;
        letter-spacing: 5px;
        fill: #1A1917;
        opacity: 0.32;
      }
    </style>
  </defs>

  <!-- Ship icon -->
  <g transform="translate(10, 8)">

    <!-- Mast -->
    <rect x="62" y="4" width="5" height="72" rx="2.5" fill="#C9A73A"/>

    <!-- Main sail (right, large) -->
    <path d="M67 8 L67 62 L108 48 Z" fill="#E8C468"/>

    <!-- Foresail (left, smaller) -->
    <path d="M62 14 L62 62 L22 50 Z" fill="#E8C468" opacity="0.6"/>

    <!-- Hull body -->
    <path d="M8 76 L16 76 L110 76 L118 76 Q124 76 124 82 L120 94 Q96 108 64 110 Q32 108 8 94 L4 82 Q4 76 8 76 Z" fill="#1A1917"/>

    <!-- Hull deck line -->
    <line x1="8" y1="76" x2="120" y2="76" stroke="#E8C468" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Waterline wave -->
    <path d="M0 100 Q16 94 32 100 Q48 106 64 100 Q80 94 96 100 Q112 106 128 100" fill="none" stroke="#1A1917" stroke-width="2" stroke-linecap="round" opacity="0.15"/>

    <!-- Small flag at top of mast -->
    <path d="M67 4 L67 20 L82 12 Z" fill="#E8C468"/>

  </g>

  <!-- Wordmark -->
  <text x="148" y="108" class="wordmark">crewcast</text>

  <!-- Tagline -->
  <text x="150" y="132" class="tagline">BUILD YOUR CREW</text>

</svg>
